<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NGO Connect</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Base Reset ── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: #111827;
        background-color: #f9fafb;
        min-height: 100dvh;
      }

      /* ── Typography ── */
      h1, h2, h3, h4, h5, h6 {
        line-height: 1.2;
        text-wrap: balance;
        font-weight: 700;
      }

      p, li {
        text-wrap: pretty;
      }

      /* ── Images ── */
      img, picture, video, canvas, svg {
        display: block;
        max-width: 100%;
      }

      /* ── Form Elements ── */
      input, button, textarea, select {
        font: inherit;
        color: inherit;
      }

      button {
        cursor: pointer;
        background: none;
        border: none;
      }

      /* ── Focus Ring ── */
      :focus-visible {
        outline: 2px solid #16a34a;
        outline-offset: 3px;
        border-radius: 6px;
      }

      /* ── Selection ── */
      ::selection {
        background: rgba(22, 163, 74, 0.15);
        color: #111827;
      }

      /* ── Scrollbar (subtle) ── */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }

      /* ── Lucide Icon Fix ── */
      /* Ensures Lucide icons render inline correctly inside React */
      [data-lucide] {
        display: inline-block;
        vertical-align: middle;
        stroke: currentColor;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        flex-shrink: 0;
      }

      /* ── Line Clamp Utility ── */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── Smooth Transitions for Interactive Elements ── */
      a, button, [role="button"] {
        transition:
          color 180ms ease,
          background-color 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease,
          opacity 180ms ease;
      }

      /* ── Reduced Motion ── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* ── Loading Shimmer for Skeletons ── */
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }

      .skeleton-shimmer {
        background: linear-gradient(
          90deg,
          #f3f4f6 25%,
          #e5e7eb 50%,
          #f3f4f6 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }

      /* ── Spin Utility ── */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .animate-spin {
        animation: spin 0.8s linear infinite;
      }

      /* ── Card Hover Scale Fix ── */
      .group:hover .group-hover\:scale-105 {
        transform: scale(1.05);
      }

      /* ── Input Number — Remove Arrows ── */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        appearance: textfield;
        -moz-appearance: textfield;
      }

      /* ── Sticky Sidebar ── */
      .sticky {
        position: sticky;
      }

      /* ── Progress Bar Transition ── */
      .progress-bar {
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── Table Numeric Alignment ── */
      .tabular-nums {
        font-variant-numeric: tabular-nums;
      }

      /* ── Tailwind Custom Config ── */
    </style>

    <!-- Tailwind Custom Config (extend default theme) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            },
            colors: {
              green: {
                50:  '#f0fdf4',
                100: '#dcfce7',
                200: '#bbf7d0',
                300: '#86efac',
                400: '#4ade80',
                500: '#22c55e',
                600: '#16a34a',
                700: '#15803d',
                800: '#166534',
                900: '#14532d',
              },
            },
            borderRadius: {
              '2xl': '1rem',
              '3xl': '1.5rem',
            },
            boxShadow: {
              sm: '0 1px 2px rgba(0,0,0,0.05)',
              DEFAULT: '0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04)',
              md: '0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04)',
              lg: '0 10px 24px rgba(0,0,0,0.07), 0 4px 8px rgba(0,0,0,0.04)',
            },
          },
        },
      };
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
